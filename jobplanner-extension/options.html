<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; }
        h1 { font-size: 20px; }
        .field { margin-bottom: 16px; }
        label { display: block; font-weight: 500; margin-bottom: 6px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #10b981; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #059669; }
        .hint { font-size: 12px; color: #666; margin-top: 4px; }
    </style>
</head>
<body>
    <h1>Paramètres JobPlanner</h1>
    <div class="field">
        <label>URL de l'API</label>
        <input type="url" id="apiUrl" placeholder="http://localhost:8000">
        <div class="hint">Ex: http://localhost:8000 pour le dev local</div>
    </div>
    <div class="field">
        <label>Token JWT</label>
        <input type="password" id="token" placeholder="Collez votre token JWT">
        <div class="hint">Obtenu après connexion sur JobPlanner (F12 → Application → Local Storage)</div>
    </div>
    <button id="save">Enregistrer</button>
    <p id="status" style="margin-top: 16px; font-size: 14px;"></p>
    <script src="options.js"></script>
</body>
</html>
