site_name: JobPlanner Docs
site_description: Documentation for JobPlanner project
site_url: https://sduvivier.github.io/JobPlanner

theme:
  name: material

plugins:
  - search
  - mermaid2

nav:
  - Overview: index.md
  - Architecture: overview/architecture.md
  - Frontend:
      - frontend/frontend.md
  - Extension:
      - extension/extension.md
  - Backend:
      - backend/backend.md
      - backend/api.md
      - backend/data-model.md
      - backend/flux.md
      - backend/security.md
      - backend/realtime.md
      - backend/mail.md
      - backend/ai.md
  - Dev: dev/dev.md
  - Devops:
      - CI: devops/ci.md

markdown_extensions:
  - admonition
  - codehilite:
      guess_lang: false
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - toc:
      permalink: true
