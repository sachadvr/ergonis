services:
  api:
    volumes:
      - ./jobplanner-api:/srv/app
      - api_vendor:/srv/app/vendor
    command: >
      sh -c "
        composer install --no-interaction --no-scripts &&
        php bin/console cache:clear &&
        (test -f config/jwt/private.pem || (mkdir -p config/jwt && openssl genrsa -out config/jwt/private.pem 4096 && openssl rsa -pubout -in config/jwt/private.pem -out config/jwt/public.pem)) &&
        php -S 0.0.0.0:8000 -t public
      "
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      AI_PROVIDER: ollama
      CORS_ALLOW_ORIGIN: '^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'
      SIMULATION_MODE: "true"
      OLLAMA_URL: http://host.docker.internal:11434
      MERCURE_PUBLIC_URL: http://mercure:3000/.well-known/mercure
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-dev-mercure-secret}

  database:
    ports:
      - "5432:5432"

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./jobplanner-frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://api:8000
      VITE_USE_PROXY: "true"
      VITE_MERCURE_URL: http://localhost:3000/.well-known/mercure
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api

  mercure:
    image: dunglas/mercure:latest
    ports:
      - "3000:3000"
    environment:
      SERVER_NAME: ':3000'
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:-dev-mercure-secret}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:-dev-mercure-secret}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://localhost:5173 http://127.0.0.1:5173
    command: /usr/bin/caddy run --config /etc/caddy/Caddyfile --adapter caddyfile

  worker:
    build:
      context: ./jobplanner-api
      dockerfile: Dockerfile
    volumes:
      - ./jobplanner-api:/srv/app
      - api_vendor:/srv/app/vendor
    command: >
      sh -c "
        composer install --no-interaction --no-scripts &&
        php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M --no-interaction -vv
      "
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      AI_PROVIDER: ollama
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8
      OLLAMA_URL: http://host.docker.internal:11434
      MAILER_DSN: smtp://mailpit:1025
      SIMULATION_MODE: "true"
    depends_on:
      - database

  scheduler:
    build:
      context: ./jobplanner-api
      dockerfile: Dockerfile
    volumes:
      - ./jobplanner-api:/srv/app
      - api_vendor:/srv/app/vendor
    command: >
      sh -c "
        composer install --no-interaction --no-scripts &&
        php bin/console messenger:consume scheduler_default --time-limit=3600 --memory-limit=256M --no-interaction -vv
      "
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8
      MAILER_DSN: smtp://mailpit:1025
      SIMULATION_MODE: "true"
      MERCURE_PUBLIC_URL: http://mercure:3000/.well-known/mercure
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-dev-mercure-secret}
    depends_on:
      - database
      - mercure

volumes:
  api_vendor:
  frontend_node_modules:
