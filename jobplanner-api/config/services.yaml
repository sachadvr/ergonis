# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    default_ai_provider: 'null'
    openai_key: ''
    openai_model: 'gpt-4o-mini'
    anthropic_key: ''
    anthropic_model: 'claude-3-5-haiku-20241022'
    mercure_public_url: ''
    mercure_jwt_secret: ''

    google_client_id: '%env(GOOGLE_CLIENT_ID)%'
    google_client_secret: '%env(GOOGLE_CLIENT_SECRET)%'
    google_redirect_uri: '%env(GOOGLE_REDIRECT_URI)%'
    azure_client_id: '%env(AZURE_CLIENT_ID)%'
    azure_client_secret: '%env(AZURE_CLIENT_SECRET)%'
    azure_redirect_uri: '%env(AZURE_REDIRECT_URI)%'

    ollama_url: '%env(OLLAMA_URL)%'
    ollama_model: '%env(OLLAMA_MODEL)%'

    mailpit_url: 'http://localhost:8025'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Service\Ai\OpenAiService:
        arguments:
            $apiKey: '%env(default:openai_key:OPENAI_API_KEY)%'
            $model: '%env(default:openai_model:OPENAI_MODEL)%'

    App\Service\Ai\AnthropicService:
        arguments:
            $apiKey: '%env(default:anthropic_key:ANTHROPIC_API_KEY)%'
            $model: '%env(default:anthropic_model:ANTHROPIC_MODEL)%'

    App\Service\Ai\OllamaService:
        arguments:
            $baseUrl: '%ollama_url%'
            $model: '%ollama_model%'

    App\Service\Ai\AiServiceFactory:
        arguments:
            $provider: '%env(default:default_ai_provider:AI_PROVIDER)%'

    App\Service\Ai\AiServiceInterface:
        class: App\Service\Ai\ConfigurableAiService

    App\Service\MercureJwtFactory:
        arguments:
            $mercureJwtSecret: '%env(default:mercure_jwt_secret:MERCURE_JWT_SECRET)%'

    App\Service\MercureNotificationPublisher:
        arguments:
            $mercurePublicUrl: '%env(default:mercure_public_url:MERCURE_PUBLIC_URL)%'

    App\Service\Mail\TokenRefreshService:
        arguments:
            $googleClientId: '%google_client_id%'
            $googleClientSecret: '%google_client_secret%'
            $azureClientId: '%azure_client_id%'
            $azureClientSecret: '%azure_client_secret%'

    App\Service\Mail\MailboxSettingsProviderInterface: '@App\Repository\UserMailboxSettingsRepository'

    App\Service\Mail\MailProviderFactory:
        arguments:
            $imapHost: '%imap_host%'
            $imapPort: '%imap_port%'
            $imapUser: '%imap_user%'
            $imapPassword: '%imap_password%'
            $imapEncryption: '%imap_encryption%'
            $mailpitUrl: '%mailpit_url%'

    App\Service\FollowUpProcessorService:
    App\Command\SendInterviewRemindersCommand:
    App\MessageHandler\SendInterviewRemindersHandler:
    App\Controller\Api\ConfigController:
    App\Controller\Api\GoogleAuthController:
        arguments:
            $googleClientId: '%google_client_id%'
            $googleClientSecret: '%google_client_secret%'
            $googleRedirectUri: '%google_redirect_uri%'

    App\Controller\Api\MicrosoftAuthController:
        arguments:
            $azureClientId: '%azure_client_id%'
            $azureClientSecret: '%azure_client_secret%'
            $azureRedirectUri: '%env(AZURE_REDIRECT_URI)%'

    App\Mailer\UserSmtpTransportFactory: ~

    App\Mailer\UserMailerService: ~
