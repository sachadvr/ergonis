framework:
    messenger:
        # failure_transport: failed

        transports:
            # https://symfony.com/doc/current/messenger.html#transport-configuration
            async: 'doctrine://default?queue_name=async'
            # failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        routing:
            App\Message\SyncEmailsMessage: async
            App\Message\SyncAllMailboxesMessage: async
            App\Message\ProcessFollowUpsMessage: async
            App\Message\SendInterviewRemindersMessage: async
            App\Message\ProcessJobOfferFromExtensionMessage: async
            App\Message\AnalyzeApplicationCvFitMessage: async

