services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
    ports:
      - "5432:5432"
    volumes:
      - database_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB:-app} -U ${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mercure:
    image: dunglas/mercure:latest
    ports:
      - "3000:3000"
    environment:
      SERVER_NAME: ':3000'
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:-dev-mercure-secret}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:-dev-mercure-secret}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://localhost:5173 http://127.0.0.1:5173
    command: /usr/bin/caddy run --config /etc/caddy/Caddyfile --adapter caddyfile

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"

  api:
    build:
      context: ./jobplanner-api
      dockerfile: Dockerfile
    env_file:
      - ./jobplanner-api/.env
    volumes:
      - ./jobplanner-api:/srv/app
      - api_vendor:/srv/app/vendor
    ports:
      - "8000:8000"
    command: >
      sh -c "
        composer install --no-interaction --no-scripts &&
        php bin/console cache:clear &&
        (test -f config/jwt/private.pem || (mkdir -p config/jwt && openssl genrsa -out config/jwt/private.pem 4096 && openssl rsa -pubout -in config/jwt/private.pem -out config/jwt/public.pem)) &&
        php -S 0.0.0.0:8000 -t public
      "
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      RUN_MIGRATIONS: "1"
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8
      MERCURE_PUBLIC_URL: http://localhost:3000/.well-known/mercure
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-dev-mercure-secret}
    depends_on:
      database:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./jobplanner-frontend:/app
      - frontend_node_modules:/app/node_modules
      - playwright_browsers:/ms-playwright
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://api:8000
      VITE_USE_PROXY: "true"
      VITE_MERCURE_URL: http://localhost:3000/.well-known/mercure
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api

volumes:
  database_data:
  api_vendor:
  frontend_node_modules:
  playwright_browsers: