services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
    volumes:
      - database_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB:-app} -U ${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
      - "1110:1110"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  mercure:
    image: dunglas/mercure:latest
    ports:
      - "3000:3000"
    environment:
      SERVER_NAME: ':3000'
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:-dev-mercure-secret}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:-dev-mercure-secret}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://localhost:5173 http://127.0.0.1:5173
    command: /usr/bin/caddy run --config /etc/caddy/Caddyfile --adapter caddyfile

  api:
    build:
      context: ./jobplanner-api
      dockerfile: Dockerfile
    env_file:
      - ./jobplanner-api/.env
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8
      MAILER_DSN: smtp://mailpit:1025
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-}
      SIMULATION_MODE: ${SIMULATION_MODE:-false}
      MERCURE_PUBLIC_URL: http://mercure:3000/.well-known/mercure
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-dev-mercure-secret}
    depends_on:
      database:
        condition: service_healthy
      mercure:
        condition: service_started

  scheduler:
    build:
      context: ./jobplanner-api
      dockerfile: Dockerfile
    env_file:
      - ./jobplanner-api/.env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8
      MAILER_DSN: smtp://mailpit:1025
      SIMULATION_MODE: ${SIMULATION_MODE:-false}
      MERCURE_PUBLIC_URL: http://mercure:3000/.well-known/mercure
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-dev-mercure-secret}
    command: php bin/console messenger:consume scheduler_default --time-limit=3600 --memory-limit=256M --no-interaction -vv
    depends_on:
      database:
        condition: service_healthy
      mercure:
        condition: service_started

  # frontend:
  #   build:
  #     context: ./jobplanner-frontend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "80:80"
  #   depends_on:
  #     - api

volumes:
  database_data:
