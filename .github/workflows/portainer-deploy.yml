name: Portainer Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    name: Trigger Portainer stack webhook
    runs-on: ubuntu-latest

    steps:
      - name: Call Portainer webhook
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$PORTAINER_WEBHOOK_URL" ]; then
            echo "PORTAINER_WEBHOOK_URL is not set"
            exit 1
          fi

          curl -fsS -X POST "$PORTAINER_WEBHOOK_URL"
