name: E2E Tests

on:
  push:
  pull_request:

jobs:
  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker-compose -f compose.test.yaml up -d database api frontend

      - name: Wait for database
        run: sleep 10

      - name: Load fixtures
        run: docker-compose -f compose.test.yaml exec -T api php bin/console doctrine:fixtures:load --no-interaction -e dev

      - name: Run Playwright tests
        working-directory: jobplanner-frontend
        run: npm run test:e2e
        env:
          FRONTEND_URL: http://localhost:5173

  backend-csfix:
    name: PHP CS Fixer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PHP CS Fixer
        run: make csfix