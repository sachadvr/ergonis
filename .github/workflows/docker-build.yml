name: Docker Build

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  test-api:
    name: Test API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start API dependencies
        run: docker compose up -d database mercure

      - name: Run API tests
        run: docker compose run --rm api php bin/phpunit --configuration phpunit.dist.xml

  build:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: ./jobplanner-api
            dockerfile: ./jobplanner-api/Dockerfile
          - service: frontend
            context: ./jobplanner-frontend
            dockerfile: ./jobplanner-frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} image for amd64
        run: docker build --platform linux/amd64 -f "${{ matrix.dockerfile }}" -t "jobplanner-${{ matrix.service }}:ci" "${{ matrix.context }}"
