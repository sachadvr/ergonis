name: Docker Build

on:
  push:

permissions:
  contents: read

jobs:
  test-api:
    name: Test API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: cp .env.example jobplanner-api/.env

      - name: Start API dependencies
        run: docker compose -f compose.test.yaml up -d database mercure

      - name: Run API tests
        run: docker compose -f compose.test.yaml run --rm api php bin/phpunit --configuration phpunit.dist.xml

  build:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: ./jobplanner-api
            dockerfile: ./jobplanner-api/Dockerfile
          - service: frontend
            context: ./jobplanner-frontend
            dockerfile: ./jobplanner-frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: cp .env.example jobplanner-api/.env

      - name: Build ${{ matrix.service }} image
        run: docker build --platform linux/amd64 -f "${{ matrix.dockerfile }}" -t "jobplanner-${{ matrix.service }}:ci" "${{ matrix.context }}"

      - name: Push ${{ matrix.service }} image
        if: github.ref == 'refs/heads/master'
        run: |
          if [ -n "${{ secrets.DOCKER_HUB_TOKEN }}" ]; then
            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            docker push "jobplanner-${{ matrix.service }}:ci"
          else
            echo "DOCKER_HUB_TOKEN not set, skipping push"
          fi
